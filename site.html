<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexgram — Connection Established</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0a0a0c;
            color: #e2e8f0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Фоновая сетка для киберпанк-атмосферы */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(to right, rgba(125, 80, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(125, 80, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: rotateX(60deg) translateY(-30%);
            top: 0;
            left: -50%;
            z-index: 1;
            animation: grid-move 20s linear infinite;
        }

        @keyframes grid-move {
            0% { background-position: 0 0; }
            100% { background-position: 0 800px; }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2.5rem;
            background: rgba(15, 15, 20, 0.8);
            border: 1px solid rgba(125, 80, 255, 0.2);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(125, 80, 255, 0.1);
            backdrop-filter: blur(12px);
            max-width: 450px;
            width: 90%;
            animation: fade-in 1.2s ease-out;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            position: relative;
            display: inline-block;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 25%;
            width: 50%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #a855f7, transparent);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            padding: 6px 16px;
            border-radius: 99px;
            border: 1px solid rgba(34, 197, 94, 0.2);
            margin: 1.5rem 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        p {
            font-size: 1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #8b5cf6, #4f46e5);
            color: #ffffff;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(125, 80, 255, 0.3);
            cursor: pointer;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(125, 80, 255, 0.5);
            background: linear-gradient(135deg, #966ef7, #5c54ed);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #4b5563;
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="container">
        <div class="logo">HEXGRAM</div>
        <div>
            <span class="status">
                <span class="status-dot"></span>
                Domain Active
            </span>
        </div>
        <p>Добро пожаловать в Hexgram. Защищённое соединение успешно установлено. Проект находится в разработке.</p>
        <button class="btn" onclick="testClick()">Проверить отклик</button>
        
        <div class="footer">
            © 2026 hexgram.loc.cc | 100 Years Protection
        </div>
    </div>

    <script>
        function testClick() {
            alert('Бэк коннект стабилен! Система готова к деплою.');
        }
    </script>
</body>
</html>
